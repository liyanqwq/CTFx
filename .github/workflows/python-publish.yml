name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu --no-save
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify bundled WebUI assets
        run: |
          python - <<'PY'
          import glob
          import sys
          import zipfile

          wheels = glob.glob("dist/*.whl")
          if not wheels:
              raise SystemExit("No wheel produced in dist/")

          target = "ctfx/server/static/index.html"
          with zipfile.ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())

          if target not in names:
              raise SystemExit(f"Missing bundled WebUI asset: {target}")

          print(f"Verified bundled WebUI asset: {target}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/ctfx/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
